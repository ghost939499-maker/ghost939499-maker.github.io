<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link rel="stylesheet" href="style.css">
</head>



<style>* {
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #f4f6f8;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.auth-container, .profile-container {
    background: #fff;
    padding: 30px;
    width: 330px;
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    text-align: center;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    background: #2563eb;
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #1e40af;
}

a {
    color: #2563eb;
    text-decoration: none;

}</style>




<body>
    
<div class="auth-container">
    <h2>Login</h2>

    <input type="text" id="li-username" placeholder="Username">
    <input type="password" id="li-password" placeholder="Password">

    <!-- IMPORTANT: type="button" -->
    <button type="button" onclick="login()">Login</button>

    <p>Don’t have an account?
        <a href="signup.html">Create one</a>
    </p>
</div>

<script src="auth.js"></script>



</body>
</html>
